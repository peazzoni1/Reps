    />

    <!-- Middle arc - teal with opacity -->
    <path
      d="M15,58 C15,44.2 26.2,33 40,33 C53.8,33 65,44.2 65,58"
      fill="none"
      stroke="rgba(61, 184, 138, 0.6)"
      stroke-width="2.5"
