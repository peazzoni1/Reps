<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#1f2e4f"/>

  <!-- Logo centered and scaled up -->
  <!-- Original viewBox is 80x60, scaling to 880x660 and centering -->
  <g transform="translate(72, 67) scale(11)">
    <!-- Outer arc - orange with opacity -->
    <path
      d="M5,58 C5,38.7 20.7,23 40,23 C59.3,23 75,38.7 75,58"
